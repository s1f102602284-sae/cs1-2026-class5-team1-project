<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ドパガキの世界</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #fcfbf9; 
            color: #2d2d2d;
            margin: 0;
            padding: 60px 20px;
            line-height: 1.8;
            letter-spacing: 0.05em; 
        }

        body > * {
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            color: #1a1a1a;
            text-align: left; 
            margin-bottom: 50px;
            position: relative;
        }

        h2 {
            font-size: 20px;
            color: #1a1a1a;
            margin-top: 40px;
            margin-bottom: 20px;
            background: linear-gradient(transparent 60%, #ffdf7e 60%); /* 黄色のマーカー線 */
            display: inline-block; 
            padding: 0 4px;
        }

        p {
            font-size: 15px;
            color: #4a4a4a;
            text-align: justify;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h1>ドパガキの世界</h1>
    <h2>ドパガキとはなんだろう？</h2>
    <p>ドーパミン中毒のガキという意味で、現代では、変化の多い、刺激の強いドーパミンをすぐ放出してしまうようなコンテンツが多くなった。それらに生まれてからすぐ触れられる今、依存してしまう人が増えた結果、揶揄する様に生まれた言葉と言える。今回はこれを馬鹿にする意味ではなく、エンタメとして楽しんでいただけたらと思う。</p>
</body>
</html>
