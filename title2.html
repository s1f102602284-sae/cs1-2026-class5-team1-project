    <h1>ドパガキの世界</h1>
    <h2>ドパガキとはなんだろう？</h2>
    <p>ドーパミン中毒のガキという意味で、現代では、変化の多い、刺激の強いドーパミンをすぐ放出してしまうようなコンテンツが多くなった。それらに生まれてからすぐ触れられる今、依存してしまう人が増えた結果、揶揄する様に生まれた言葉と言える。今回はこれを馬鹿にする意味ではなく、エンタメとして楽しんでいただけたらと思う。</p>
